# OpenFDTD-X (GUI) CI — Linux/Windows で Qt6 ビルド + 自己テスト。
# 処理ロジック (ofd/orcwa/obpm) はビルドに不要 (実行時に QProcess で起動する
# 疎結合) のため、この CI はカーネル無しで完結する。
name: CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Self test (.ofd round-trip + voxelizer + glass + room acoustics)
        run: ./build/ofdx_selftest

      # 音響コア (C++14) は上の Build ステップに含まれる。ここでは CTest に
      # 登録された acoustics.* テストを実行する。合成 RIR による残響指標の
      # 検証は acoustics.reverberation (test_reverberation) が担う。
      # acoustics.c_api (tests/acoustics/test_c_api.c) は CMake により
      # C コンパイラで -std=c99 としてビルドされるため、この ctest 実行が
      # 「C API が純 C としてコンパイル・リンクできる」ことの検証を兼ねる。
      # 実外部ソルバーは不要: 人工 RIR はその場で生成し、フェーズ5 の
      # acoustics.runner はビルド済みモックソルバー
      # (ofdx_mock_acoustic_solver — 出力契約の参照実装) を起動して
      # AcousticRunner → 契約検証 → RirAnalyzer の統合経路を検証する。
      - name: Acoustics tests (ctest)
        run: ctest --test-dir build --output-on-failure

      - name: GUI smoke (offscreen screenshot)
        run: |
          export QT_QPA_PLATFORM=offscreen XDG_RUNTIME_DIR=/tmp/xdg
          mkdir -p /tmp/xdg
          timeout 60 ./build/openfdtd_x tests/data/dipole.ofd \
            --domain optical --screenshot /tmp/gui-optical.png
          timeout 60 ./build/openfdtd_x tests/data/dipole.ofd \
            --domain acoustic --screenshot /tmp/gui-acoustic.png
          test -s /tmp/gui-optical.png && test -s /tmp/gui-acoustic.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: gui-screenshots
          path: /tmp/gui-*.png

  windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          arch: win64_msvc2019_64
          cache: true

      - name: Configure
        run: cmake -B build

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Self test
        run: build/Release/ofdx_selftest.exe
        shell: bash

      # Linux と同様: CTest 登録済みの acoustics.* を実行する
      # (acoustics.c_api は C99 としてコンパイルされた純 C テスト)。
      # TMPDIR は test_wav の一時 wav 出力先 (既定 /tmp は Windows に無い)。
      - name: Acoustics tests (ctest)
        run: ctest --test-dir build -C Release --output-on-failure
        env:
          TMPDIR: ${{ runner.temp }}
